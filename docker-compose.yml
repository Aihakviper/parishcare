services:
  api:
    build:
      context: .
    command: >
      uvicorn app.main:app
      --host ${PARISHCARE_API_HOST:?PARISHCARE_API_HOST is required}
      --port ${PARISHCARE_API_PORT:?PARISHCARE_API_PORT is required}
      --reload
    env_file:
      - .env
    ports:
      - "${PARISHCARE_API_PORT:?PARISHCARE_API_PORT is required}:${PARISHCARE_API_PORT:?PARISHCARE_API_PORT is required}"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
